name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Validate tag ──────────────────────────────────────────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.0.1. Got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PACKAGE_VERSION." >&2
            echo "Bump package.json first, then tag v$PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

  # ── Build per platform ────────────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows-x64
            platform: windows
            build-flag: --win --x64
            python-arch: x64
            artifact-glob: "out/dist/*.exe\nout/dist/*.blockmap\nout/dist/latest.yml"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
          token: ""

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-arch }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run release readiness gate
        env:
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.tag }}
          LICENSE_CHECK_URL: https://the-ska-auditing-app.vercel.app/api/license
          ALLOW_UNSIGNED_RELEASE: "1"
          RELEASE_PLATFORM: ${{ matrix.platform }}
        run: bun run release:check

      # Python venv — Windows uses pwsh, others use bash
      - name: Create Python virtual environment (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt pytest pyinstaller

      - name: Create Python virtual environment (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r backend/requirements.txt pytest pyinstaller

      - name: Run production verification
        env:
          PYTHON: ${{ matrix.platform == 'windows' && '.venv\\Scripts\\python.exe' || '.venv/bin/python' }}
        run: bun run verify:prod

      - name: Build platform installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.tag }}
        run: bunx electron-builder ${{ matrix.build-flag }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            ${{ matrix.artifact-glob }}
          retention-days: 1

  # ── Publish GitHub Release ────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Bank Audit App ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
