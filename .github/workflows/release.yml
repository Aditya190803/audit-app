name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.0.1. Got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PACKAGE_VERSION." >&2
            echo "Bump package.json first, then tag v$PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Create Python virtual environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt pytest

      - name: Typecheck frontend and Electron
        run: bun run typecheck

      - name: Run backend tests
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest backend\tests

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_GITHUB_OWNER: ${{ github.repository_owner }}
          UPDATE_GITHUB_REPO: ${{ github.event.repository.name }}
          UPDATE_GITHUB_PRIVATE: ${{ github.event.repository.private }}
        run: |
          bun run build
          bun run build:python
          bunx electron-builder --win --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Bank Audit App ${{ steps.release.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            out/dist/*.exe
            out/dist/*.blockmap
            out/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
