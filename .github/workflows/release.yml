name: Release (Windows 64-bit only)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.5)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.0.1. Got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PACKAGE_VERSION." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

  build-windows:
    name: Build Windows x64
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run release readiness gate
        env:
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.tag }}
          LICENSE_CHECK_URL: https://the-ska-auditing-app.vercel.app/api/license
          ALLOW_UNSIGNED_RELEASE: "1"
          RELEASE_PLATFORM: windows
        run: bun run release:check

      - name: Create Python venv & install deps
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt pytest pyinstaller

      - name: Run production verification
        env:
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.tag }}
          LICENSE_CHECK_URL: https://the-ska-auditing-app.vercel.app/api/license
          ALLOW_UNSIGNED_RELEASE: "1"
          RELEASE_PLATFORM: windows
          PYTHON: .venv\Scripts\python.exe
        run: bun run verify:prod

      - name: Build Windows 64-bit installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.tag }}
        run: npx electron-builder --win --x64 --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: |
            out/dist/*.exe
            out/dist/*.blockmap
            out/dist/latest.yml
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [validate, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Bank Audit App ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
