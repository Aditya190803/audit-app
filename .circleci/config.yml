version: 2.1

# ── Orbs ──────────────────────────────────────────────────────
orbs:
  gh: circleci/github-cli@2.4

# ── Parameters (manual trigger via CircleCI API) ──────────────
parameters:
  release-tag:
    type: string
    default: ""

# ── Shared command: Node + Bun + Python ──────────────────────
commands:
  setup-bun:
    steps:
      - run:
          name: Install Bun
          command: |
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV

  setup-bun-windows:
    steps:
      - run:
          name: Install Bun (Windows)
          shell: powershell.exe
          command: |
            powershell -c "irm bun.sh/install.ps1 | iex"
            $bunBin = "$env:USERPROFILE\.bun\bin"
            $env:Path = "$bunBin;" + $env:Path
            [System.Environment]::SetEnvironmentVariable('Path', $env:Path, 'User')

  ensure-bun-path:
    steps:
      - run:
          name: Ensure Bun is on PATH
          command: |
            if [ -f "$BASH_ENV" ]; then
              # shellcheck disable=SC1090
              source "$BASH_ENV"
            fi
            command -v bun

  ensure-bun-path-windows:
    steps:
      - run:
          name: Ensure Bun is on PATH (Windows)
          shell: powershell.exe
          command: |
            $bunBin = "$env:USERPROFILE\.bun\bin"
            if (-not (Test-Path $bunBin)) {
              throw "Bun not found at $bunBin"
            }
            $env:Path = "$bunBin;" + $env:Path
            Get-Command bun

  install-deps:
    steps:
      - setup-bun
      - run:
          name: Install frontend dependencies
          command: |
            source "$BASH_ENV"
            bun install --frozen-lockfile

  install-deps-windows:
    steps:
      - setup-bun-windows
      - run:
          name: Install frontend dependencies (Windows)
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            bun install --frozen-lockfile

# ── Jobs ──────────────────────────────────────────────────────
jobs:
  validate:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Resolve & validate release tag
          command: |
            TAG="${CIRCLE_TAG:-${RELEASE_TAG:-<< pipeline.parameters.release-tag >>}}"
            if [ -z "$TAG" ]; then
              echo "No tag provided — set CIRCLE_TAG (tag push) or pass release-tag parameter." >&2
              exit 1
            fi
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag must be vX.Y.Z, got: $TAG" >&2
              exit 1
            fi
            VERSION="${TAG#v}"
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
              echo "Tag $TAG doesn't match package.json version $PACKAGE_VERSION" >&2
              exit 1
            fi
            echo "Validated release tag $TAG (version $VERSION)"
      - persist_to_workspace:
          root: .
          paths:
            - .

  build-windows:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium
    environment:
      ALLOW_UNSIGNED_RELEASE: "1"
      RELEASE_PLATFORM: windows
    steps:
      - attach_workspace:
          at: .
      - install-deps-windows
      - run:
          name: Ensure Python 3.12
          shell: powershell.exe
          command: |
            # Use pre-installed Python or install via Chocolatey (more reliable on CircleCI)
            if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
              choco install python312 -y
            }
            python --version
      - run:
          name: Create Python venv & install deps
          shell: powershell.exe
          command: |
            python -m venv .venv
            .\.venv\Scripts\python.exe -m pip install --upgrade pip
            .\.venv\Scripts\python.exe -m pip install -r backend/requirements.txt pytest pyinstaller
      - ensure-bun-path-windows
      - run:
          name: Production verification
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            $env:PYTHON = "$pwd\.venv\Scripts\python.exe"
            $env:UPDATE_FEED_URL = "https://github.com/$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME/releases/download/$env:CIRCLE_TAG"
            $env:LICENSE_CHECK_URL = "https://the-ska-auditing-app.vercel.app/api/license"
            bun run verify:prod
      - run:
          name: Build Windows installer
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            $env:GH_TOKEN = "$env:GITHUB_TOKEN"
            $env:UPDATE_FEED_URL = "https://github.com/$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME/releases/download/$env:CIRCLE_TAG"
            bun run package:ci:win
      - store_artifacts:
          path: out/dist
      - persist_to_workspace:
          root: .
          paths:
            - out/dist

  build-macos-arm64:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    environment:
      ALLOW_UNSIGNED_RELEASE: "1"
      RELEASE_PLATFORM: mac
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - attach_workspace:
          at: .
      - install-deps
      - run:
          name: Create Python venv & install deps
          command: |
            python3 -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r backend/requirements.txt pytest pyinstaller
      - ensure-bun-path
      - run:
          name: Production verification
          command: |
            source "$BASH_ENV"
            export PYTHON=".venv/bin/python"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            export LICENSE_CHECK_URL="https://the-ska-auditing-app.vercel.app/api/license"
            bun run verify:prod
      - run:
          name: Build macOS arm64 (Apple Silicon)
          command: |
            source "$BASH_ENV"
            export GH_TOKEN="$GITHUB_TOKEN"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            bun run package:ci:mac:arm64
      - store_artifacts:
          path: out/dist
      - persist_to_workspace:
          root: .
          paths:
            - out/dist

  build-macos-x64:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    environment:
      ALLOW_UNSIGNED_RELEASE: "1"
      RELEASE_PLATFORM: mac
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - attach_workspace:
          at: .
      - install-deps
      - run:
          name: Create Python venv & install deps
          command: |
            python3 -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r backend/requirements.txt pytest pyinstaller
      - ensure-bun-path
      - run:
          name: Production verification
          command: |
            source "$BASH_ENV"
            export PYTHON=".venv/bin/python"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            export LICENSE_CHECK_URL="https://the-ska-auditing-app.vercel.app/api/license"
            bun run verify:prod
      - run:
          name: Build macOS x64 (Intel — cross-compile)
          command: |
            source "$BASH_ENV"
            export GH_TOKEN="$GITHUB_TOKEN"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            bun run package:ci:mac:x64
      - store_artifacts:
          path: out/dist
      - persist_to_workspace:
          root: .
          paths:
            - out/dist

  build-linux:
    docker:
      - image: cimg/python:3.12-node
    environment:
      ALLOW_UNSIGNED_RELEASE: "1"
      RELEASE_PLATFORM: linux
    steps:
      - attach_workspace:
          at: .
      - install-deps
      - run:
          name: Create Python venv & install deps
          command: |
            python -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r backend/requirements.txt pytest pyinstaller
      - ensure-bun-path
      - run:
          name: Production verification
          command: |
            source "$BASH_ENV"
            export PYTHON=".venv/bin/python"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            export LICENSE_CHECK_URL="https://the-ska-auditing-app.vercel.app/api/license"
            bun run verify:prod
      - run:
          name: Build Linux AppImage
          command: |
            source "$BASH_ENV"
            export GH_TOKEN="$GITHUB_TOKEN"
            export UPDATE_FEED_URL="https://github.com/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/releases/download/$CIRCLE_TAG"
            bun run package:ci:linux
      - store_artifacts:
          path: out/dist
      - persist_to_workspace:
          root: .
          paths:
            - out/dist

  publish:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - gh/setup
      - run:
          name: Create GitHub Release & upload assets
          command: |
            TAG="${CIRCLE_TAG}"
            VERSION="${TAG#v}"

            # Create the release
            gh release create "$TAG" \
              --title "Bank Audit App $VERSION" \
              --generate-notes

            # Upload all platform artifacts
            gh release upload "$TAG" out/dist/* --clobber

# ── Workflows ─────────────────────────────────────────────────
workflows:
  release:
    when:
      matches:
        pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
        value: << pipeline.git.tag >>
    jobs:
      - validate:
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/

      - build-windows:
          requires: [validate]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

      # macOS builds temporarily removed for this release
      # (hitting CircleCI macOS concurrency limit)
      # Re-enable by restoring the two build-macos-* entries + updating publish requires
      # - build-macos-arm64: ...
      # - build-macos-x64: ...

      - build-linux:
          requires: [validate]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

      - publish:
          requires: [build-windows, build-linux]
          context: [github-release]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/