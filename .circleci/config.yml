version: 2.1

# ── Orbs ──────────────────────────────────────────────────────
orbs:
  gh: circleci/github-cli@2.4

# ── Parameters (manual trigger via CircleCI API) ──────────────
parameters:
  release-tag:
    type: string
    default: ""

# ── Shared command: Node + Bun + Python (Windows) ─────────────
commands:
  setup-bun-windows:
    steps:
      - run:
          name: Install Bun (Windows)
          shell: powershell.exe
          command: |
            powershell -c "irm bun.sh/install.ps1 | iex"
            $bunBin = "$env:USERPROFILE\.bun\bin"
            $env:Path = "$bunBin;" + $env:Path
            [System.Environment]::SetEnvironmentVariable('Path', $env:Path, 'User')

  ensure-bun-path-windows:
    steps:
      - run:
          name: Ensure Bun is on PATH (Windows)
          shell: powershell.exe
          command: |
            $bunBin = "$env:USERPROFILE\.bun\bin"
            if (-not (Test-Path $bunBin)) {
              throw "Bun not found at $bunBin"
            }
            $env:Path = "$bunBin;" + $env:Path
            Get-Command bun

  install-deps-windows:
    steps:
      - setup-bun-windows
      - run:
          name: Install frontend dependencies (Windows)
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            bun install --frozen-lockfile

# ── Jobs ──────────────────────────────────────────────────────
jobs:
  validate:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Resolve & validate release tag
          command: |
            TAG="${CIRCLE_TAG:-${RELEASE_TAG:-<< pipeline.parameters.release-tag >>}}"
            if [ -z "$TAG" ]; then
              echo "No tag provided — set CIRCLE_TAG (tag push) or pass release-tag parameter." >&2
              exit 1
            fi
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag must be vX.Y.Z, got: $TAG" >&2
              exit 1
            fi
            VERSION="${TAG#v}"
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
              echo "Tag $TAG doesn't match package.json version $PACKAGE_VERSION" >&2
              exit 1
            fi
            echo "Validated release tag $TAG (version $VERSION)"
      - persist_to_workspace:
          root: .
          paths:
            - .

  build-windows:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium
    environment:
      ALLOW_UNSIGNED_RELEASE: "1"
      RELEASE_PLATFORM: windows
    steps:
      - attach_workspace:
          at: .
      - install-deps-windows
      - run:
          name: Ensure Python 3.12
          shell: powershell.exe
          command: |
            if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
              choco install python312 -y
            }
            python --version
      - run:
          name: Create Python venv & install deps
          shell: powershell.exe
          command: |
            python -m venv .venv
            .\.venv\Scripts\python.exe -m pip install --upgrade pip
            .\.venv\Scripts\python.exe -m pip install -r backend/requirements.txt pytest pyinstaller
      - ensure-bun-path-windows
      - run:
          name: Production verification
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            $env:PYTHON = "$pwd\.venv\Scripts\python.exe"
            $env:UPDATE_FEED_URL = "https://github.com/$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME/releases/download/$env:CIRCLE_TAG"
            $env:LICENSE_CHECK_URL = "https://the-ska-auditing-app.vercel.app/api/license"
            bun run verify:prod
      - run:
          name: Build Windows installer (64-bit only)
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.bun\bin;" + $env:Path
            $env:GH_TOKEN = "$env:GITHUB_TOKEN"
            $env:UPDATE_FEED_URL = "https://github.com/$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME/releases/download/$env:CIRCLE_TAG"
            bun run package:ci:win
      - run:
          name: Stage artifacts for workspace (win)
          shell: powershell.exe
          command: |
            New-Item -ItemType Directory -Force -Path out\release\win
            Copy-Item -Recurse -Force out\dist\* out\release\win\
      - store_artifacts:
          path: out/dist
      - persist_to_workspace:
          root: .
          paths:
            - out/release/win

  publish:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Consolidate platform artifacts
          command: |
            mkdir -p out/dist
            if [ -d "out/release/win" ]; then
              cp -r out/release/win/* out/dist/
            fi
            echo "=== Consolidated artifacts ==="
            ls -la out/dist/
      - gh/setup
      - run:
          name: Create GitHub Release & upload assets
          command: |
            TAG="${CIRCLE_TAG}"
            if [ -z "$TAG" ]; then
              echo "CIRCLE_TAG is empty — publish only runs on version tags." >&2
              exit 1
            fi
            VERSION="${TAG#v}"

            mapfile -t assets < <(find out/dist -maxdepth 1 -type f ! -name '.*' | sort)
            if [ "${#assets[@]}" -eq 0 ]; then
              echo "No release files in out/dist." >&2
              exit 1
            fi
            echo "Uploading ${#assets[@]} file(s):"
            printf '  %s\n' "${assets[@]}"

            if ! gh release view "$TAG" >/dev/null 2>&1; then
              gh release create "$TAG" \
                --title "Bank Audit App $VERSION" \
                --generate-notes
            else
              echo "Release $TAG already exists — uploading assets only."
            fi

            gh release upload "$TAG" "${assets[@]}" --clobber

# ── Workflows ─────────────────────────────────────────────────
workflows:
  release:
    when:
      matches:
        pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
        value: << pipeline.git.tag >>
    jobs:
      - validate:
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
            branches:
              ignore: /.*/

      - build-windows:
          requires: [validate]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

      - publish:
          requires: [build-windows]
          context: [github-release]
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/